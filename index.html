<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro</title>
    <style>
        /* --- 1. MODERN VARIABLES & RESET --- */
        :root {
            --primary-color: #6c5ce7;
            --primary-hover: #5b4bc4;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --text-muted: #636e72;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --danger-color: #ff7675;
            --success-color: #00b894;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* --- 2. MAIN CONTAINER --- */
        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            margin: 20px;
            transition: transform 0.3s ease;
        }

        .header {
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- 3. INPUT GROUP --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button.add-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button.add-btn:hover {
            background: var(--primary-hover);
        }

        /* --- 4. TASK LIST STYLING --- */
        ul {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #fdfdfd;
            border-bottom: 1px solid #f1f2f6;
            transition: all 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: #fafafa;
        }

        /* Custom Checkbox Appearance */
        .task-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #dfe6e9;
            border-radius: 50%;
            margin-right: 15px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .task-checkbox:checked {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        /* Checkmark icon using pseudo-element */
        .task-checkbox:checked::after {
            content: '✔';
            color: white;
            font-size: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .task-checkbox:checked + .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Delete Button */
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            opacity: 0; /* Hidden until hover */
            transition: opacity 0.2s;
            padding: 5px;
            font-size: 1.2rem;
        }

        .task-item:hover .delete-btn {
            opacity: 1;
        }

        /* --- 5. ANIMATIONS --- */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-out {
            animation: slideOut 0.3s forwards;
        }

        @keyframes slideOut {
            to { opacity: 0; transform: translateX(20px); }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>My Tasks</h1>
            <p>Stay organized and get things done.</p>
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off">
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>

        <ul id="taskList">
            </ul>
        
        <div id="emptyState" class="empty-state">No tasks yet. Add one above!</div>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');

        // 1. Add Task Function
        function addTask() {
            const taskText = taskInput.value.trim();

            if (taskText === "") return; // Don't add empty tasks

            // Create List Item (LI)
            const li = document.createElement('li');
            li.className = 'task-item';

            // Create HTML structure for the task
            // We use a checkbox for state, a span for text, and a button for delete
            li.innerHTML = `
                <input type="checkbox" class="task-checkbox" onclick="toggleComplete(this)">
                <span class="task-text">${taskText}</span>
                <button class="delete-btn" onclick="deleteTask(this)">&times;</button>
            `;

            // Add to list
            taskList.prepend(li); // Adds new task to the TOP

            // Clear input
            taskInput.value = '';
            
            // Check empty state
            updateEmptyState();
        }

        // 2. Delete Function
        function deleteTask(buttonElement) {
            const li = buttonElement.parentElement;
            
            // Add slide-out animation class
            li.classList.add('slide-out');

            // Wait for animation to finish before removing from DOM
            li.addEventListener('animationend', function() {
                li.remove();
                updateEmptyState();
            });
        }

        // 3. Toggle Complete Function (Optional logic if needed beyond CSS)
        function toggleComplete(checkbox) {
            // CSS handles the visual strikethrough via the :checked selector
            // We can add logic here if we wanted to save to a database later
            console.log("Task status changed");
        }

        // 4. Handle "Enter" Key
        taskInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
        
        // 5. Update Empty State visibility
        function updateEmptyState() {
            if (taskList.children.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
            }
        }
    </script>
</body>
</html>
